<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SENTINEL — CAS OPS · Glovo</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --y:#FFC244;--y-dk:#E5A820;--y-lt:#FFF8E8;--y-md:rgba(255,194,68,.18);
  --g:#00A082;--g-lt:#E8F8F5;--g-md:rgba(0,160,130,.15);
  --r:#E53935;--r-lt:#FEECEC;--r-md:rgba(229,57,53,.12);
  --b:#1565C0;--b-lt:#E3F0FF;--b-md:rgba(21,101,192,.12);
  --pu:#7B1FA2;--pu-lt:#F5EAF8;--pu-md:rgba(123,31,162,.12);
  --bg:#F4F6F9;--bg2:#FFFFFF;--bg3:#F8FAFB;
  --tx:#1C2940;--tx2:#5A7090;--tx3:#9AB0C4;
  --bd:rgba(0,0,0,.07);--bd2:rgba(0,0,0,.12);
  --cas-bg:#FEF3C7;--cas-tx:#92400E;--cas-bd:#F59E0B;
  --drb-bg:#DBEAFE;--drb-tx:#1E40AF;--drb-bd:#3B82F6;
  --bsk-bg:#F3E8FF;--bsk-tx:#6B21A8;--bsk-bd:#8B5CF6;
  --rbt-bg:#DCFCE7;--rbt-tx:#166534;--rbt-bd:#10B981;
  --agd-bg:#FFE4E6;--agd-tx:#BE123C;--agd-bd:#F43F5E;
  --moh-bg:#E0E7FF;--moh-tx:#3730A3;--moh-bd:#6366F1;
  --lyn-bg:#FEF08A;--lyn-tx:#854D0E;--lyn-bd:#EAB308;
  --r:12px;--r2:8px;--r3:6px;--sh:0 2px 12px rgba(0,0,0,.08);--sh2:0 8px 32px rgba(0,0,0,.12);
}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--tx);display:flex;flex-direction:column;font-size:14px}

/* ── LOGIN ── */
#loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#0B1628 0%,#1a2840 100%)}
.login-box{background:#fff;border-radius:20px;padding:40px;width:400px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.login-logo{width:64px;height:64px;background:var(--y);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 16px}
.login-title{font-size:24px;font-weight:800;text-align:center;margin-bottom:4px}
.login-sub{font-size:12px;color:var(--tx3);text-align:center;margin-bottom:28px}
.login-users{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.login-user{padding:12px 8px;border:2px solid var(--bd2);border-radius:var(--r2);text-align:center;cursor:pointer;transition:all .15s}
.login-user:hover,.login-user.sel{border-color:var(--y);background:var(--y-lt)}
.login-user .u-av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;font-size:12px;margin:0 auto 6px}
.login-user .u-nm{font-size:12px;font-weight:700}
.login-user .u-role{font-size:10px;color:var(--tx3);margin-top:2px}
.lf{margin-bottom:14px}
.lf label{display:block;font-size:9px;font-weight:700;color:var(--tx3);margin-bottom:5px;text-transform:uppercase;letter-spacing:1px}
.lf input{width:100%;padding:12px 14px;border:2px solid var(--bd2);border-radius:var(--r2);font-size:14px;outline:none;font-family:inherit;transition:border-color .15s}
.lf input:focus{border-color:var(--y)}
.login-err{color:var(--r);font-size:12px;text-align:center;margin-bottom:10px;min-height:16px}
.login-btn{width:100%;padding:14px;background:var(--y);border:none;border-radius:var(--r2);font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:background .15s}
.login-btn:hover{background:var(--y-dk)}

/* ── NAV ── */
.navbar{background:var(--bg2);border-bottom:1px solid var(--bd);height:58px;display:flex;align-items:center;padding:0 20px;flex-shrink:0;box-shadow:var(--sh);z-index:100}
.nav-brand{display:flex;align-items:center;gap:10px;margin-right:20px;flex-shrink:0;border-right:1px solid var(--bd);padding-right:20px}
.nav-logo{width:38px;height:38px;background:var(--y);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;position:relative}
.nav-logo::after{content:'G';position:absolute;bottom:-3px;right:-3px;width:15px;height:15px;background:var(--g);border-radius:50%;font-size:8px;font-weight:900;color:#fff;display:flex;align-items:center;justify-content:center;border:2px solid var(--bg2)}
.nb-name{font-size:15px;font-weight:800;color:var(--tx)}
.nb-sub{font-size:9px;color:var(--g);text-transform:uppercase;letter-spacing:1.5px;font-weight:600}
.nav-links{display:flex;align-items:center;gap:2px;flex:1;overflow-x:auto}
.ni{display:flex;align-items:center;gap:7px;padding:8px 14px;border-radius:var(--r2);cursor:pointer;color:var(--tx2);font-size:13px;font-weight:500;transition:all .15s;border:1px solid transparent;user-select:none;white-space:nowrap}
.ni:hover{background:var(--bg3);color:var(--tx)}
.ni.active{background:var(--y-md);color:#8B6914;border-color:rgba(255,194,68,.3);font-weight:700}
.ni-ic{font-size:15px}
.nbadge{background:var(--r);color:#fff;font-size:9px;font-weight:800;padding:1px 6px;border-radius:8px;margin-left:2px}
.nav-right{display:flex;align-items:center;gap:8px;margin-left:auto;flex-shrink:0;border-left:1px solid var(--bd);padding-left:16px}
.clock{font-size:11px;color:var(--tx3);font-family:'Courier New',monospace;background:var(--bg3);padding:4px 10px;border-radius:var(--r3);border:1px solid var(--bd)}
.user-badge{display:flex;align-items:center;gap:6px;padding:5px 10px;border-radius:20px;background:var(--y-md);border:1px solid rgba(255,194,68,.3);font-size:11px;font-weight:700;color:#8B6914}
.user-av{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:800;color:#fff}

/* ── CONTENT ── */
.content{flex:1;overflow-y:auto;padding:20px;scrollbar-width:thin}
.content::-webkit-scrollbar{width:4px}.content::-webkit-scrollbar-thumb{background:rgba(0,0,0,.1);border-radius:2px}
.pg{display:none;animation:fi .2s ease;max-width:1400px;margin:0 auto}
.pg.active{display:block}
@keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

/* ── CARDS ── */
.card{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);padding:18px;margin-bottom:14px;box-shadow:var(--sh)}
.chd{font-size:13px;font-weight:700;color:var(--tx);margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.ph{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px}
.ph-t{font-size:22px;font-weight:800;color:var(--tx)}

/* ── KPI ── */
.krow{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:18px}
.kpi{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);padding:18px 16px;position:relative;overflow:hidden;transition:all .2s;box-shadow:var(--sh)}
.kpi:hover{transform:translateY(-2px);box-shadow:var(--sh2)}
.kpi-top{height:3px;position:absolute;top:0;left:0;right:0}
.kpi.y .kpi-top{background:var(--y)}.kpi.g .kpi-top{background:var(--g)}.kpi.r .kpi-top{background:var(--r)}.kpi.b .kpi-top{background:var(--b)}.kpi.p .kpi-top{background:var(--pu)}
.kpi-ic{font-size:32px;position:absolute;right:14px;bottom:10px;opacity:.1}
.kpi-lbl{font-size:9px;color:var(--tx3);text-transform:uppercase;letter-spacing:1.2px;font-weight:700;margin-bottom:8px}
.kpi-val{font-size:32px;font-weight:900;line-height:1;margin-bottom:3px}
.kpi.y .kpi-val{color:#92400E}.kpi.g .kpi-val{color:#065F46}.kpi.r .kpi-val{color:var(--r)}.kpi.b .kpi-val{color:var(--b)}.kpi.p .kpi-val{color:var(--pu)}
.kpi-sub{font-size:11px;color:var(--tx3)}
.email-cd{display:flex;align-items:center;gap:10px;background:linear-gradient(135deg,var(--y-lt),#FFF);border:1px solid rgba(255,194,68,.4);border-radius:var(--r);padding:12px 16px;margin-bottom:16px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.sr{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--bd)}
.sr:last-child{border:none}
.av{display:flex;align-items:center;justify-content:center;border-radius:50%;font-weight:800;color:#fff;flex-shrink:0}
.av-lg{width:36px;height:36px;font-size:13px}.av-md{width:28px;height:28px;font-size:10px}.av-sm{width:22px;height:22px;font-size:8px}
.sr-info{flex:1;min-width:0}
.sr-nm{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sr-hs{font-size:10px;color:var(--g);font-weight:600;margin-top:1px}
.pill{display:inline-block;padding:3px 9px;border-radius:var(--r3);font-size:10px;font-weight:700;white-space:nowrap}
.pill.sm{background:var(--g-md);color:#065F46}.pill.se{background:var(--y-md);color:#92400E}
.pill.sn{background:var(--pu-md);color:var(--pu)}.pill.so{background:var(--bg3);color:var(--tx3)}
.pill.sa{background:var(--r-md);color:var(--r)}.pill.sc{background:var(--b-md);color:var(--b)}
.ctag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:var(--r3);font-size:10px;font-weight:700;border:1px solid}
.zones{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px}
.zc{padding:16px 12px;border-radius:var(--r);text-align:center;border:1px solid;transition:transform .2s;box-shadow:var(--sh)}
.zc:hover{transform:translateY(-2px)}

/* ── PLANNING ── */
.plan-top{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.plan-ttl{font-size:14px;font-weight:700;flex:1;text-align:center}
.wk-bar{font-size:11px;text-align:center;padding:7px 14px;background:var(--y-lt);border-radius:20px;margin-bottom:12px;border:1px solid rgba(255,194,68,.3);font-weight:600;color:#92400E}
.ftabs{display:flex;gap:5px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.ft{padding:7px 14px;border-radius:20px;cursor:pointer;font-size:12px;font-weight:500;border:1px solid var(--bd2);background:var(--bg2);color:var(--tx2);transition:all .15s;font-family:inherit}
.ft:hover{border-color:var(--y);color:#92400E;background:var(--y-lt)}
.ft.active{background:var(--y);color:#000;border-color:var(--y);font-weight:700}
.tbl-wr{overflow-x:auto;border-radius:var(--r);border:1px solid var(--bd);box-shadow:var(--sh);background:var(--bg2)}
table{width:100%;border-collapse:collapse;font-size:11px}
thead tr{background:var(--bg3)}
thead th{color:var(--tx3);padding:10px 5px;text-align:center;font-size:9px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;border-bottom:2px solid var(--bd);white-space:nowrap}
thead th:first-child{text-align:left;padding-left:14px;min-width:150px}
tbody td{padding:5px 4px;border-bottom:1px solid rgba(0,0,0,.04);text-align:center;vertical-align:middle}
tbody td:first-child{text-align:left;padding-left:14px;font-weight:600}
tbody tr:hover td{background:rgba(255,194,68,.04)}
.sep-row td{font-size:10px;font-weight:800;padding:8px 14px;border-bottom:2px solid var(--bd)}
.h-ok{background:var(--g-lt);color:#065F46;font-weight:700;border-radius:var(--r3);padding:3px 8px;display:inline-block}
.h-wn{background:var(--y-lt);color:#92400E;font-weight:700;border-radius:var(--r3);padding:3px 8px;display:inline-block}
.h-er{background:var(--r-lt);color:var(--r);font-weight:700;border-radius:var(--r3);padding:3px 8px;display:inline-block}
.prog-44{height:3px;background:rgba(0,0,0,.06);border-radius:2px;margin-top:4px;overflow:hidden;width:60px}
.prog-44-f{height:100%;border-radius:2px;transition:width .4s ease}
.ecell{cursor:pointer;transition:background .15s;border-radius:var(--r3);position:relative}
.ecell:hover{background:rgba(255,194,68,.1)!important}
.ecell:hover .e-ic{opacity:1}
.e-ic{font-size:8px;color:var(--y-dk);opacity:0;transition:opacity .15s;display:block;margin-top:2px}
.hs-b{font-size:9px;color:var(--g);font-weight:600;margin-top:3px;max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:block}

/* ── MODAL ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(28,41,64,.55);z-index:1000;align-items:center;justify-content:center;backdrop-filter:blur(3px)}
.overlay.show{display:flex}
.modal{background:var(--bg2);border:1px solid var(--bd);border-radius:16px;width:460px;max-width:95vw;overflow:hidden;box-shadow:var(--sh2);animation:moda .2s ease;max-height:90vh;overflow-y:auto}
.modal-lg{width:640px}
@keyframes moda{from{opacity:0;transform:scale(.95) translateY(-10px)}to{opacity:1;transform:none}}
.modal-hd{background:var(--y);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:1}
.modal-hd-t{font-size:14px;font-weight:800;color:#000}
.m-close{background:rgba(0,0,0,.12);border:none;color:#000;font-size:16px;cursor:pointer;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700}
.m-close:hover{background:rgba(0,0,0,.2)}
.m-body{padding:20px}
.m-info{background:var(--bg3);border-radius:var(--r2);padding:12px 14px;margin-bottom:16px;border-left:3px solid var(--y)}
.fg{margin-bottom:14px}
.fg label{display:block;font-size:9px;font-weight:700;color:var(--tx3);margin-bottom:5px;text-transform:uppercase;letter-spacing:1px}
.fc{width:100%;padding:10px 14px;border:1px solid var(--bd2);border-radius:var(--r2);background:var(--bg2);color:var(--tx);font-size:13px;font-family:inherit;outline:none;transition:border-color .15s}
.fc:focus{border-color:var(--y);box-shadow:0 0 0 3px rgba(255,194,68,.15)}
.fc-ta{resize:vertical;min-height:80px}
.m-footer{display:flex;gap:10px;padding:0 20px 20px;justify-content:flex-end}
.m-msg{padding:4px 20px 8px;font-size:12px;min-height:20px}
.h-preview{display:inline-block;padding:2px 8px;border-radius:var(--r3);background:var(--g-lt);color:var(--g);font-size:10px;font-weight:700;margin-left:8px}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.fgl label{display:block;font-size:9px;font-weight:700;color:var(--tx3);margin-bottom:5px;text-transform:uppercase;letter-spacing:1px}
.fcs{width:100%;padding:10px 14px;border:1px solid var(--bd2);border-radius:var(--r2);background:var(--bg2);color:var(--tx);font-size:13px;font-family:inherit;outline:none}
.fcs:focus{border-color:var(--y)}

/* ── BTNS & UTILS ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:var(--r2);cursor:pointer;font-size:12px;font-weight:600;border:1px solid;transition:all .15s;font-family:inherit;white-space:nowrap}
.btn-y{background:var(--y);color:#000;border-color:var(--y)}.btn-y:hover{background:var(--y-dk)}
.btn-g{background:var(--g);color:#fff;border-color:var(--g)}.btn-g:hover{opacity:.85}
.btn-r{background:var(--r-lt);color:var(--r);border-color:var(--r)}.btn-r:hover{background:var(--r);color:#fff}
.btn-gh{background:var(--bg2);color:var(--tx2);border-color:var(--bd2);box-shadow:var(--sh)}.btn-gh:hover{border-color:var(--y);color:#92400E}
.btn-sm{padding:6px 12px;font-size:11px}.btn-ico{width:32px;height:32px;padding:0;justify-content:center}
.srch{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.si{flex:1;min-width:150px;padding:9px 14px;border:1px solid var(--bd2);border-radius:var(--r2);background:var(--bg2);color:var(--tx);font-size:13px;outline:none}
.si:focus{border-color:var(--y)}
select.sel{padding:8px 12px;border:1px solid var(--bd2);border-radius:var(--r2);background:var(--bg2);color:var(--tx);font-size:12px;cursor:pointer;outline:none}
.toast-wrap{position:fixed;bottom:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{display:flex;align-items:center;gap:10px;padding:12px 16px;border-radius:var(--r);background:var(--bg2);border:1px solid var(--bd);box-shadow:0 8px 24px rgba(0,0,0,.15);font-size:13px;font-weight:500;max-width:340px;animation:tin .3s ease;color:var(--tx)}
.toast.ok{border-color:rgba(0,160,130,.4);background:var(--g-lt);color:#065F46}
.toast.er{border-color:rgba(229,57,53,.4);background:var(--r-lt);color:var(--r)}
@keyframes tin{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:none}}
@keyframes tout{from{opacity:1}to{opacity:0;transform:translateX(30px)}}
.sw{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px;color:var(--tx3)}
.spin{width:28px;height:28px;border:3px solid rgba(255,194,68,.2);border-top-color:var(--y);border-radius:50%;animation:rot .6s linear infinite;margin-bottom:10px}
@keyframes rot{to{transform:rotate(360deg)}}
.em{text-align:center;padding:36px 16px;color:var(--tx3)}.em-ic{font-size:36px;margin-bottom:10px;opacity:.5}.em-tx{font-size:13px}
.flex{display:flex;align-items:center}.gap2{gap:8px}.mt1{margin-top:4px}
.txs{font-size:11px}.txxs{font-size:10px}.tx2c{color:var(--tx2)}.tx3c{color:var(--tx3)}.fw7{font-weight:700}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700}
@media(max-width:1200px){.krow{grid-template-columns:repeat(3,1fr)}.zones{grid-template-columns:repeat(3,1fr)}}
@media(max-width:900px){.g2{grid-template-columns:1fr}.krow{grid-template-columns:repeat(2,1fr)}.fgrid{grid-template-columns:1fr}}
@media(max-width:700px){.ni span{display:none}.ni-ic{font-size:18px}}
</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">🛵</div>
    <div class="login-title">SENTINEL</div>
    <div class="login-sub">Glovo Maroc · CAS OPS — Plateforme sécurisée</div>
    <div class="login-users" id="loginUsers"></div>
    <input type="hidden" id="selUser" value="">
    <div class="lf"><label>Mot de passe</label><input type="password" id="loginPwd" placeholder="Saisissez votre accès" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <div class="login-err" id="loginErr"></div>
    <button class="login-btn" onclick="doLogin()">🔑 Connexion</button>
  </div>
</div>

<div id="app" style="display:none;height:100%;flex-direction:column;display:none">
<nav class="navbar">
  <div class="nav-brand">
    <div class="nav-logo">🛵</div>
    <div><div class="nb-name">SENTINEL</div><div class="nb-sub">Glovo · CAS OPS</div></div>
  </div>
  <div class="nav-links" id="navLinks"></div>
  <div class="nav-right">
    <div class="clock" id="clock"></div>
    <div class="user-badge" id="userBadge">
      <div class="user-av" id="userAv">?</div>
      <span id="userName">—</span>
    </div>
    <button class="btn btn-gh btn-ico btn-sm" onclick="doLogout()" title="Déconnexion">🚪</button>
  </div>
</nav>

<div class="content" id="appContent">
  <div class="pg active" id="pg-ov">
    <div class="ph"><div><div class="ph-t" id="ov-title">Dashboard</div><div class="txs tx2c" id="ov-date"></div></div></div>
    <div class="krow">
      <div class="kpi y"><div class="kpi-top"></div><div class="kpi-lbl">Total Agents</div><div class="kpi-val" id="k-tot">—</div><div class="kpi-sub">affectés</div><div class="kpi-ic">👥</div></div>
      <div class="kpi g"><div class="kpi-top"></div><div class="kpi-lbl">Actifs aujourd'hui</div><div class="kpi-val" id="k-act">—</div><div class="kpi-sub">en service</div><div class="kpi-ic">✅</div></div>
      <div class="kpi b"><div class="kpi-top"></div><div class="kpi-lbl">Hotspots</div><div class="kpi-val" id="k-hs">—</div><div class="kpi-sub">configurés</div><div class="kpi-ic">📍</div></div>
      <div class="kpi p"><div class="kpi-top"></div><div class="kpi-lbl">Taux 44h</div><div class="kpi-val" id="k-44">—</div><div class="kpi-sub">respect de l'objectif</div><div class="kpi-ic">⏱</div></div>

function ini(n){return n.split(' ').slice(0,2).map(function(w){return w[0]||'';}).join('').toUpperCase();}
function calcH(s){
  if(!s||['OFF','ABSENT','CONGE'].indexOf(String(s).toUpperCase())>-1)return 0;
  var raw=String(s).split('-');if(raw.length<2)return 0;
  var toM=function(x){var hm=x.trim().split(':');return parseInt(hm[0])*60+(parseInt(hm[1])||0);};
  var diff=toM(raw[1])-toM(raw[0]);if(diff<0)diff+=1440;return Math.round(diff/6)/10;
}
function sClass(s){if(!s||s==='OFF'||s==='—')return 'so';var h=parseInt(s);if(h>=19||h<8)return 'sn';if(h>=12)return 'se';return 'sm';}
function fmtD(d){return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear();}

function getLundi(off){
  var t=new Date(),dow=t.getDay(); 
  var diff=dow===1?0:dow===0?-6:1-dow;
  var l=new Date(t); l.setDate(t.getDate()+diff+(off||0)*7); l.setHours(0,0,0,0); return l;
}
function numSem(date){var s=new Date(date.getFullYear(),0,1);return Math.ceil(((date-s)/86400000+s.getDay()+1)/7);}

// ── GENERATION PLANNING ──
function genPlanningAgent(ag, idx, dates, wn){
  var ville = ag.ville;
  
  // Repos obligatoirement entre Lundi (0) et Jeudi (3)
  var offOpts = [0, 1, 2, 3];
  var offDay = offOpts[(idx + wn) % offOpts.length];
  
  // Rotation Hebdomadaire (Matin ou Soir)
  var band = (idx + wn) % 2; 

  // Ajustement Tranches par Taille de Ville
  var poolMatin = ['09:00-16:00', '09:00-17:00', '10:00-17:00', '10:00-18:00'];
  var poolSoir = [];
  
  if (ville === 'CAS' || ville === 'RBT') {
    poolSoir = ['18:00-01:00', '18:00-02:00', '19:00-02:00', '19:00-03:00'];
  } else if (ville === 'BSK' || ville === 'DRB' || ville === 'MOH') { 
    // Équipes de 3 : Max 02:00
    poolSoir = ['16:00-00:00', '17:00-01:00', '18:00-02:00'];
  } else { 
    // Équipes de 2/1 (AGD, LYN) : Max 01:00
    poolSoir = ['15:00-23:00', '16:00-00:00', '17:00-01:00'];
  }

  var myPool = band === 0 ? poolMatin : poolSoir;
  var shifts = Array(7).fill(null);
  
  // 44H en 6 Jours -> Mix de 7h et 8h
  var dayLengths = [7, 7, 7, 7, 8, 8]; // Total = 44
  // Mélanger pour variété
  dayLengths.sort(function() { return 0.5 - Math.random(); });
  
  var dlIdx = 0;
  for(var d = 0; d < 7; d++){
    if(d === offDay) { shifts[d] = 'OFF'; continue; }
    
    var requiredH = dayLengths[dlIdx++];
    // Chercher le shift dans le pool correspondant à requiredH
    var match = myPool.find(function(s) { return calcH(s) === requiredH; });
    // Fallback si pas trouvé
    if(!match) { match = myPool[d % myPool.length]; }
    shifts[d] = match;
  }

  // Force correction 44h si décalage (sécurité)
  var total = Math.round(shifts.reduce(function(acc, s){return acc+calcH(s);}, 0)*10)/10;
  var i = 0;
  while(total !== 44 && i++ < 20) {
      for(var j=0; j<7; j++) {
          if(shifts[j] === 'OFF') continue;
          var h = calcH(shifts[j]);
          if(total < 44 && h === 7) { 
              var nS = myPool.find(function(s){return calcH(s)===8;});
              if(nS) { shifts[j] = nS; total++; }
          } else if(total > 44 && h === 8) {
              var nS2 = myPool.find(function(s){return calcH(s)===7;});
              if(nS2) { shifts[j] = nS2; total--; }
          }
      }
  }

  return { nom:ag.nom, ville:ag.ville, zone:ag.zone, shifts:shifts, totalH:total };
}

function genPlanning(agents, wOff){
  var lundi=getLundi((wOff||0)+1); var wn=numSem(lundi);
  var dates=[]; for(var i=0;i<7;i++){var d=new Date(lundi);d.setDate(lundi.getDate()+i);dates.push(fmtD(d));}
  var planning=agents.map(function(ag,idx){return genPlanningAgent(ag,idx,dates,wn);});
  return {planning:planning, dates:dates, wn:wn};
}

function getAgents(){
  var a=localStorage.getItem(SK.AGENTS);
  if(!a){localStorage.setItem(SK.AGENTS,JSON.stringify(DEFAULT_AGENTS));return DEFAULT_AGENTS;}
  return JSON.parse(a);
}

function loadData(off){
  if(off!==undefined) weekOffset=off;
  var agents=getAgents();
  var lundi=getLundi(weekOffset+1);
  var key = SK.PLAN + numSem(lundi) + '_' + lundi.getFullYear();
  
  var planData = JSON.parse(localStorage.getItem(key)||'null');
  if(!planData) {
      planData = genPlanning(agents, weekOffset);
      localStorage.setItem(key, JSON.stringify(planData));
  }
  
  var visibleVilles = currentUser.villes;
  D.agents = agents.filter(function(a){return visibleVilles.indexOf(a.ville)>-1;});
  D.planning = planData.planning.filter(function(p){return visibleVilles.indexOf(p.ville)>-1;});
  D.meta = {dates:planData.dates, weekNum:planData.wn};
  
  rOv(); rPlanning();
}

function regenererPlanning(){
  var lundi=getLundi(weekOffset+1);
  var key = SK.PLAN + numSem(lundi) + '_' + lundi.getFullYear();
  localStorage.removeItem(key);
  loadData(weekOffset);
  toast('Planning recalculé avec succès','ok');
}

  }

  document.getElementById('ov-zones').innerHTML = currentUser.villes.map(function(v){

}

function rPlanning(){
  var plan=gFC==='ALL' ? D.planning : D.planning.filter(function(p){return p.ville===gFC;});
  var dates=D.meta.dates;
  document.getElementById('wk-bar').textContent = '📅 Semaine W'+D.meta.weekNum+' — Lun '+dates[0]+' au Dim '+dates[6];
  
  var tbl=document.getElementById('pl-tbl');
  var html='<thead><tr><th style="text-align:left;padding-left:14px">Agent</th><th>Ville</th><th>Zone</th>'+
    JOURS.map(function(j,i){return '<th>'+j+'<br><span style="opacity:.5;font-size:8px">'+(dates[i])+'</span></th>';}).join('')+'<th>H/SEM</th></tr></thead><tbody>';
  
  var prev='';
  plan.forEach(function(p){
    if(p.ville!==prev){var clr=CC[p.ville]||{};html+='<tr class="sep-row"><td colspan="11" style="background:'+clr.bg+';color:'+clr.tx+';border-left:3px solid '+clr.bd+'">'+CLA[p.ville]+'</td></tr>';prev=p.ville;}
    var pct=Math.min(100,Math.round((p.totalH/44)*100));
    var hCls=p.totalH===44?'h-ok':'h-er';
    html+='<tr><td><div class="flex gap2"><div class="av av-sm" style="background:'+CC[p.ville].bg+';color:'+CC[p.ville].tx+'">'+ini(p.nom)+'</div><div><div>'+p.nom+'</div><div class="prog-44"><div class="prog-44-f" style="width:'+pct+'%;background:'+(p.totalH===44?'var(--g)':'var(--r)')+'"></div></div></div></div></td>'+
      '<td><span style="font-size:10px;padding:2px 7px;border-radius:var(--r3);font-weight:700;background:'+CC[p.ville].bg+';color:'+CC[p.ville].tx+'">'+p.ville+'</span></td>'+
      '<td class="txxs tx3c">'+p.zone+'</td>'+
      p.shifts.map(function(s){return '<td><span class="pill '+sClass(s)+'">'+s+'</span></td>';}).join('')+
      '<td><span class="'+hCls+'">'+p.totalH+'h</span></td></tr>';
  });
  html+='</tbody>'; tbl.innerHTML=html;
}
